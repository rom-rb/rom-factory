name:
  gem: rom-factory
  constant: ROM::Factory
  title: ROM Factory
github_org: rom-rb
gemspec:
  authors: ["Hanakai team"]
  email: ["info@hanakai.org"]
  summary: "ROM based builder library to make your specs awesome. DSL partially inspired by FactoryBot."
  homepage: "https://hanakai.org/learn/rom/factories"
  runtime_dependencies:
    - ["dry-configurable", "~> 1.3"]
    - ["dry-core", "~> 1.1"]
    - ["dry-struct", "~> 1.7"]
    - ["faker", ">= 2.0", "< 4"]
    - ["rom-core", "~> 5.4"]
    - ["tsort", "~> 0.2"]
  required_ruby_version: ">= 3.1.0"
